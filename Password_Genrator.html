<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Honest Password Strength Checker</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }
  .box {
    width: 340px;
    margin: 120px auto;
    background: #fff;
    padding: 20px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  h3 { text-align: center; }
  label { display: block; margin-top: 10px; }
  input[type="number"], input[type="text"] {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    color: white;
  }
  .green { background: #4caf50; }
  .blue  { background: #2196f3; }
  .red   { background: #f44336; }

  #strength {
    margin-top: 12px;
    text-align: center;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="box">
  <h3>Honest Password Generator</h3>

  <label>Password Length</label>
  <input type="number" id="len" placeholder="8 - 50">

  <label>Generated Password</label>
  <input type="text" id="pwd" readonly>

  <label>
    <input type="checkbox" id="long">
    Allow extra-long (up to 50)
  </label>

  <button class="green" onclick="generate()">Generate</button>
  <button class="blue" onclick="copyPwd()">Copy</button>
  <button class="red" onclick="clearAll()">Clear</button>

  <div id="strength">Strength: 0</div>
</div>

<script>
const charset =
"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?";

function secureRandom(max) {
  const a = new Uint32Array(1);
  crypto.getRandomValues(a);
  return a[0] % max;
}

function generate() {
  const lenInput = document.getElementById("len");
  const out = document.getElementById("pwd");
  const allowLong = document.getElementById("long").checked;

  let maxLen = allowLong ? 50 : 30;
  let len = parseInt(lenInput.value);

  if (!len || len < 8) {
    alert("Minimum length is 8");
    return;
  }

  if (len > maxLen) {
    len = maxLen;
    lenInput.value = maxLen;
  }

  let pwd = "";
  for (let i = 0; i < len; i++) {
    pwd += charset.charAt(secureRandom(charset.length));
  }

  out.value = pwd;
  evaluateStrength(pwd);
}

function evaluateStrength(pwd) {
  let score = 0;

  /* 🔥 HONEST WEIGHTING 🔥 */

  // Length (dominant factor)
  if (pwd.length >= 8)  score += 15;
  if (pwd.length >= 12) score += 20;
  if (pwd.length >= 16) score += 25;
  if (pwd.length >= 24) score += 30;

  // Character diversity
  if (/[a-z]/.test(pwd)) score += 10;
  if (/[A-Z]/.test(pwd)) score += 10;
  if (/[0-9]/.test(pwd)) score += 10;
  if (/[^a-zA-Z0-9]/.test(pwd)) score += 10;

  // Weak patterns (penalties)
  if (/(.)\1{2,}/.test(pwd)) score -= 15;        // aaa, 111
  if (/1234|abcd|qwer/i.test(pwd)) score -= 20; // sequences
  if (/^[A-Za-z]+\d+$/.test(pwd)) score -= 10;  // Word123
  if (/password|admin|login/i.test(pwd)) score -= 40;

  // Label (NO CLAMPING 😈)
  let label = "🟢 Strong";
  if (score < 0) label = "💀 Extremely Weak";
  else if (score < 30) label = "🔴 Weak";
  else if (score < 60) label = "🟠 Medium";
  else if (score < 100) label = "🟡 Very Strong";
  else if (score >= 100) label = "🔥 Insane";

  document.getElementById("strength").innerText =
    `Strength: ${score} (${label})`;
}

function copyPwd() {
  const p = document.getElementById("pwd").value;
  if (!p) return;
  navigator.clipboard.writeText(p);
  alert("Copied!");
}

function clearAll() {
  document.getElementById("pwd").value = "";
  document.getElementById("strength").innerText = "Strength: 0";
}
</script>

</body>
</html>
