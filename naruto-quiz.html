<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Naruto Ultimate Hokage Quiz 🍥</title>

<link rel="icon"
href="https://wallpapers.com/images/featured/naruto-profile-pictures-sa1tekghfajrr928.webp">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
url("https://images6.alphacoders.com/413/413205.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
padding:40px 20px;
}

.container{
max-width:950px;
margin:auto;
}

.title{
text-align:center;
margin-bottom:40px;
animation:float 3s ease-in-out infinite;
}

.title h1{
font-size:4rem;
color:#ff9800;
text-shadow:
0 0 10px #ff9800,
0 0 30px #ff5722;
}

.title p{
margin-top:10px;
font-size:1.2rem;
color:#ddd;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
}

.quiz-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.15);

padding:30px;
border-radius:25px;

margin-bottom:25px;

transition:0.4s;

box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.quiz-card:hover{
transform:translateY(-6px) scale(1.01);

border-color:#ff9800;

box-shadow:
0 0 20px rgba(255,152,0,0.5),
0 0 40px rgba(255,87,34,0.2);
}

.question-number{
color:#ff9800;
font-size:1rem;
font-weight:600;
margin-bottom:10px;
}

.question{
font-size:1.5rem;
margin-bottom:20px;
}

.option{
display:flex;
align-items:center;

padding:15px 20px;
margin-bottom:15px;

border-radius:15px;

background:rgba(255,255,255,0.05);

cursor:pointer;

transition:0.3s;
}

.option:hover{
background:rgba(255,152,0,0.12);
transform:translateX(8px);

border:1px solid #ff9800;
}

.option input{
margin-right:15px;
transform:scale(1.4);

accent-color:#ff9800;
}

.submit-btn{
width:100%;
height:70px;

border:none;
border-radius:18px;

background:linear-gradient(45deg,#ff9800,#ff5722);

color:white;

font-size:1.4rem;
font-weight:bold;

cursor:pointer;

transition:0.4s;

box-shadow:0 0 20px rgba(255,152,0,0.5);
}

.submit-btn:hover{
transform:scale(1.03);

box-shadow:
0 0 20px #ff9800,
0 0 40px #ff5722;
}

.result-box{
display:none;

margin-top:40px;

padding:35px;

text-align:center;

border-radius:25px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(10px);

animation:fadeIn 1s ease;
}

.result-box h2{
font-size:2.5rem;
margin-bottom:15px;
}

.result-box p{
font-size:1.4rem;
color:#ddd;
}

.rank{
margin-top:20px;

font-size:2rem;
font-weight:bold;

color:#ff9800;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.title h1{
font-size:2.5rem;
}

.question{
font-size:1.2rem;
}

.option{
padding:12px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
<h1>🍥 Naruto Ultimate Hokage Quiz 🍥</h1>
<p>Only True Shinobi Can Score 21/21 🔥</p>
</div>

<form id="quizForm"></form>

<button class="submit-btn" type="submit" form="quizForm">
🔥 Submit Quiz 🔥
</button>

<div class="result-box" id="resultBox">
<h2 id="scoreText"></h2>
<p id="percentageText"></p>
<div class="rank" id="rankText"></div>
</div>

</div>

<script>

const allQuestions = [

{
question:"Who killed Rin?",
options:["Naruto","Neji","Kakashi","Obito"],
correct:"Kakashi"
},

{
question:"Who created Rasengan?",
options:["Jiraiya","Minato","Naruto","Boruto"],
correct:"Minato"
},

{
question:"Who has Rinnegan?",
options:["Sasuke","Itachi","Kakashi","Sarada"],
correct:"Sasuke"
},

{
question:"Who is the Fifth Hokage?",
options:["Hashirama","Tsunade","Naruto","Madara"],
correct:"Tsunade"
},

{
question:"Who has Mangekyou but no Susanoo?",
options:["Madara","Itachi","Sasuke","Obito"],
correct:"Obito"
},

{
question:"Who is not an Uchiha?",
options:["Itachi","Sasuke","Kakashi","Madara"],
correct:"Kakashi"
},

{
question:"Who is known as the God of Shinobi?",
options:["Tobirama","Hashirama","Sakura","Rin"],
correct:"Hashirama"
},

{
question:"Who is the father of Kakashi Hatake?",
options:["Might Dai","Jiraiya","Hiruzen","Sakumo"],
correct:"Sakumo"
},

{
question:"What is Kakashi's Mangekyou ability?",
options:["Amaterasu","Tsukuyomi","Kamui","Kotoamatsukami"],
correct:"Kamui"
},

{
question:"Who awakened Eternal Mangekyou Sharingan first?",
options:["Madara","Itachi","Hagoromo","Sasuke"],
correct:"Madara"
},

{
question:"Who awakened Rinnegan first?",
options:["Hagoromo","Sasuke","Obito","Naruto"],
correct:"Hagoromo"
},

{
question:"Who gave Kakashi his Sharingan?",
options:["Sasuke","Itachi","Obito","Madara"],
correct:"Obito"
},

{
question:"What color is Amaterasu flame?",
options:["Blue","Black","Red","Purple"],
correct:"Black"
},

{
question:"Which eye technique belongs to Shisui?",
options:["Kamui","Kotoamatsukami","Amaterasu","Izanagi"],
correct:"Kotoamatsukami"
},

{
question:"Who mastered Sage Mode perfectly?",
options:["Jiraiya","Minato","Naruto","Kabuto"],
correct:"Naruto"
},

{
question:"How many tails does Kurama have?",
options:["8","7","9","10"],
correct:"9"
},

{
question:"Who was Gaara's tailed beast?",
options:["Kurama","Shukaku","Son Goku","Gyuki"],
correct:"Shukaku"
},

{
question:"Who was the leader of Akatsuki?",
options:["Obito","Pain","Itachi","Kisame"],
correct:"Pain"
},

{
question:"Who loved explosions?",
options:["Sasori","Deidara","Kakuzu","Hidan"],
correct:"Deidara"
},

{
question:"Naruto became which Hokage?",
options:["Fifth Hokage","Sixth Hokage","Seventh Hokage","Eighth Hokage"],
correct:"Seventh Hokage"
},

{
question:"Who wanted infinite dreams for everyone?",
options:["Naruto","Madara","Kakashi","Neji"],
correct:"Madara"
}

];

function shuffle(array){

for(let i = array.length - 1; i > 0; i--){

const j = Math.floor(Math.random() * (i + 1));

[array[i], array[j]] = [array[j], array[i]];

}

return array;

}

const questions =
shuffle([...allQuestions]).slice(0,10);

const form = document.getElementById("quizForm");

questions.forEach((q,index)=>{

const card = document.createElement("div");

card.classList.add("quiz-card");

let html = `

<div class="question-number">
Question ${index + 1}
</div>

<div class="question">
${q.question}
</div>

`;

q.options.forEach(option=>{

html += `

<label class="option">

<input type="radio"
name="question${index}"
value="${option}">

${option}

</label>

`;

});

card.innerHTML = html;

form.appendChild(card);

});

form.addEventListener("submit",(e)=>{

e.preventDefault();

let score = 0;

questions.forEach((q,index)=>{

const selected = document.querySelector(
`input[name="question${index}"]:checked`
);

if(selected && selected.value === q.correct){
score++;
}

});

const percentage =
Math.round((score / questions.length) * 100);

document.getElementById("resultBox").style.display = "block";

document.getElementById("scoreText").innerHTML =
`🎯 You scored ${score}/10`;

document.getElementById("percentageText").innerHTML =
`🔥 Accuracy: ${percentage}%`;

let rank = "";

if(score === 10){

rank = "👑 TRUE HOKAGE 👑";

}
else if(score >= 8){

rank = "⚔️ KAGE LEVEL ⚔️";

}
else if(score >= 6){

rank = "🔥 JONIN LEVEL 🔥";

}
else if(score >= 4){

rank = "🍃 GENIN LEVEL 🍃";

}
else{

rank = "😂 ACADEMY STUDENT 😂";

}

document.getElementById("rankText").innerHTML = rank;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

});

</script>

</body>
</html>
