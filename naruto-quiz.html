<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Naruto Ultimate Quiz 🍥</title>

<link rel="icon"
href="https://wallpapers.com/images/featured/naruto-profile-pictures-sa1tekghfajrr928.webp">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.8)),
    url('https://images6.alphacoders.com/413/413205.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
    padding:40px 20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:40px;
    animation: float 3s ease-in-out infinite;
}

.title h1{
    font-size:4rem;
    color:#ff9800;
    text-shadow:
    0 0 10px #ff9800,
    0 0 30px #ff5722;
}

.title p{
    margin-top:10px;
    color:#ddd;
    font-size:1.1rem;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

.quiz-card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:30px;
    margin-bottom:30px;
    transition:0.4s;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.quiz-card:hover{
    transform:translateY(-8px) scale(1.01);
    border-color:#ff9800;
    box-shadow:
    0 0 20px rgba(255,152,0,0.4),
    0 0 50px rgba(255,87,34,0.2);
}

.question-number{
    color:#ff9800;
    font-size:1rem;
    margin-bottom:10px;
    font-weight:600;
}

.question{
    font-size:1.5rem;
    margin-bottom:25px;
}

.option{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.05);
    border:2px solid transparent;
    padding:15px 20px;
    border-radius:15px;
    margin-bottom:15px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:rgba(255,152,0,0.12);
    border-color:#ff9800;
    transform:translateX(8px);
}

.option input{
    margin-right:15px;
    transform:scale(1.4);
    accent-color:#ff9800;
}

.submit-btn{
    width:100%;
    height:65px;
    border:none;
    border-radius:18px;
    background:linear-gradient(45deg,#ff9800,#ff5722);
    color:white;
    font-size:1.3rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 0 20px rgba(255,152,0,0.4);
}

.submit-btn:hover{
    transform:scale(1.03);
    box-shadow:
    0 0 20px #ff9800,
    0 0 40px #ff5722;
}

.result-box{
    margin-top:40px;
    text-align:center;
    padding:30px;
    border-radius:25px;
    display:none;
    animation:fadeIn 1s ease;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.result-box h2{
    font-size:2rem;
    margin-bottom:15px;
}

.result-box p{
    font-size:1.3rem;
    color:#ddd;
}

.rank{
    margin-top:20px;
    font-size:2rem;
    color:#ff9800;
    font-weight:bold;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

.title h1{
    font-size:2.5rem;
}

.question{
    font-size:1.2rem;
}

.option{
    padding:12px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
<h1>🍥 Naruto Ultimate Quiz 🍥</h1>
<p>Test your Shinobi knowledge and become Hokage! 🔥</p>
</div>

<form id="quizForm">

<!-- QUESTION TEMPLATE -->

<div class="quiz-card">
<div class="question-number">Question 1</div>
<div class="question">Who killed Rin?</div>

<label class="option">
<input type="radio" name="question1" value="1">
Naruto
</label>

<label class="option">
<input type="radio" name="question1" value="2">
Neji
</label>

<label class="option">
<input type="radio" name="question1" value="3">
Kakashi
</label>

<label class="option">
<input type="radio" name="question1" value="4">
Obito
</label>
</div>

<div class="quiz-card">
<div class="question-number">Question 2</div>
<div class="question">Who created Rasengan?</div>

<label class="option">
<input type="radio" name="question2" value="1">
Jiraiya
</label>

<label class="option">
<input type="radio" name="question2" value="2">
Minato
</label>

<label class="option">
<input type="radio" name="question2" value="3">
Naruto
</label>

<label class="option">
<input type="radio" name="question2" value="4">
Boruto
</label>
</div>

<div class="quiz-card">
<div class="question-number">Question 3</div>
<div class="question">Who has Rinnegan?</div>

<label class="option">
<input type="radio" name="question3" value="1">
Sasuke
</label>

<label class="option">
<input type="radio" name="question3" value="2">
Itachi
</label>

<label class="option">
<input type="radio" name="question3" value="3">
Kakashi
</label>

<label class="option">
<input type="radio" name="question3" value="4">
Sarada
</label>
</div>

<div class="quiz-card">
<div class="question-number">Question 4</div>
<div class="question">Who is the Fifth Hokage?</div>

<label class="option">
<input type="radio" name="question4" value="1">
Hashirama
</label>

<label class="option">
<input type="radio" name="question4" value="2">
Tsunade
</label>

<label class="option">
<input type="radio" name="question4" value="3">
Naruto
</label>

<label class="option">
<input type="radio" name="question4" value="4">
Madara
</label>
</div>

<div class="quiz-card">
<div class="question-number">Question 5</div>
<div class="question">Who has Mangekyou but no Susanoo?</div>

<label class="option">
<input type="radio" name="question5" value="1">
Madara
</label>

<label class="option">
<input type="radio" name="question5" value="2">
Itachi
</label>

<label class="option">
<input type="radio" name="question5" value="3">
Sasuke
</label>

<label class="option">
<input type="radio" name="question5" value="4">
Obito
</label>
</div>

<button class="submit-btn" type="submit">
🔥 Submit Quiz 🔥
</button>

</form>

<div class="result-box" id="resultBox">
<h2 id="scoreText"></h2>
<p id="percentageText"></p>
<div class="rank" id="rankText"></div>
</div>

</div>

<script>

const correctAnswers = {
question1:"3",
question2:"2",
question3:"1",
question4:"2",
question5:"4"
};

const form = document.getElementById("quizForm");

form.addEventListener("submit",(e)=>{

e.preventDefault();

let score = 0;

for(let question in correctAnswers){

const selected = document.querySelector(
`input[name="${question}"]:checked`
);

if(selected && selected.value === correctAnswers[question]){
score++;
}

}

const totalQuestions = Object.keys(correctAnswers).length;

const percentage = Math.round(
(score / totalQuestions) * 100
);

document.getElementById("resultBox").style.display = "block";

document.getElementById("scoreText").innerHTML =
`🎯 You scored ${score} out of ${totalQuestions}`;

document.getElementById("percentageText").innerHTML =
`✨ Accuracy: ${percentage}%`;

let rank = "";

if(score === totalQuestions){
rank = "👑 HOKAGE LEVEL 👑";
}
else if(score >= 4){
rank = "⚔️ JONIN LEVEL ⚔️";
}
else if(score >= 2){
rank = "🍃 GENIN LEVEL 🍃";
}
else{
rank = "😂 ACADEMY STUDENT 😂";
}

document.getElementById("rankText").innerHTML = rank;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

});

</script>

</body>
</html>
