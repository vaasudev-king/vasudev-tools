<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Roadmap 🌸</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;

            background: linear-gradient(135deg, #ffd6eb, #e4d7ff);
            font-family: "Segoe UI", sans-serif;
        }

        textarea {
            width: 100%;
            height: calc(100vh - 40px);

            padding: 25px;

            border: 3px solid #d787ff;
            border-radius: 20px;
            outline: none;

            background: rgba(255, 255, 255, 0.88);

            font-family: Consolas, monospace;
            font-size: 24px;
            line-height: 1.6;
            color: #38234d;

            resize: none;

            box-shadow: 0 10px 30px rgba(120, 50, 160, 0.2);
        }

        textarea:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }
    </style>
</head>

<body>

    <textarea
        id="roadmap"
        spellcheck="false"
        placeholder="Paste roadmap here~ 🌸"
    ></textarea>

    <script>
        const roadmap = document.getElementById("roadmap");

        roadmap.value =
            localStorage.getItem("roadmap") || "";

        roadmap.addEventListener("input", () => {
            localStorage.setItem("roadmap", roadmap.value);
        });
    </script>

</body>
</html>
