<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Roadmap 🌸</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;

            background: linear-gradient(135deg, #ffd6eb, #e4d7ff);
            font-family: "Segoe UI", sans-serif;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        button {
            flex-shrink: 0;

            padding: 10px 20px;

            border: 0;
            border-radius: 12px;

            background: rgba(255, 255, 255, 0.7);

            font-size: 18px;
            cursor: pointer;
        }

        button.active {
            background: #ff69b4;
            color: white;
        }

        .add-button {
            font-weight: bold;
            font-size: 22px;
        }

        textarea {
            width: 100%;
            height: calc(100vh - 95px);

            padding: 25px;

            border: 3px solid #d787ff;
            border-radius: 20px;
            outline: none;

            background: rgba(255, 255, 255, 0.88);

            font-family: Consolas, monospace;
            font-size: 24px;
            line-height: 1.6;
            color: #38234d;

            resize: none;

            box-shadow:
                0 10px 30px rgba(120, 50, 160, 0.2);
        }

        textarea:focus {
            border-color: #ff69b4;

            box-shadow:
                0 0 20px rgba(255, 105, 180, 0.4);
        }
    </style>
</head>

<body>

    <div class="tabs" id="tabs"></div>

    <textarea
        id="roadmap"
        spellcheck="false"
        placeholder="Paste roadmap here~ 🌸"
    ></textarea>

    <script>
        const roadmap = document.getElementById("roadmap");
        const tabs = document.getElementById("tabs");

        let units = JSON.parse(
            localStorage.getItem("roadmap-units")
        ) || ["U1"];

        let currentUnit =
            localStorage.getItem("current-roadmap-unit")
            || units[0];

        function storageKey(unit) {
            return `roadmap-${unit}`;
        }

        function saveCurrentPage() {
            localStorage.setItem(
                storageKey(currentUnit),
                roadmap.value
            );
        }

        function switchUnit(unit) {
            saveCurrentPage();

            currentUnit = unit;

            localStorage.setItem(
                "current-roadmap-unit",
                currentUnit
            );

            roadmap.value =
                localStorage.getItem(storageKey(unit)) || "";

            renderTabs();
            roadmap.focus();
        }

        function addUnit() {
            saveCurrentPage();

            const unitNumber = units.length + 1;
            const newUnit = `U${unitNumber}`;

            units.push(newUnit);

            localStorage.setItem(
                "roadmap-units",
                JSON.stringify(units)
            );

            switchUnit(newUnit);
        }

        function renderTabs() {
            tabs.innerHTML = "";

            units.forEach(unit => {
                const button = document.createElement("button");

                button.textContent = unit;

                if (unit === currentUnit) {
                    button.classList.add("active");
                }

                button.onclick = () => switchUnit(unit);

                tabs.appendChild(button);
            });

            const addButton = document.createElement("button");

            addButton.textContent = "+";
            addButton.classList.add("add-button");
            addButton.onclick = addUnit;

            tabs.appendChild(addButton);
        }

        roadmap.addEventListener(
            "input",
            saveCurrentPage
        );

        roadmap.value =
            localStorage.getItem(storageKey(currentUnit)) || "";

        renderTabs();
    </script>

</body>
</html>
